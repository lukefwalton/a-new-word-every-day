name: iOS Tests

# Builds the app + widget extension and runs the Swift unit suite on a macOS
# runner. The Xcode project is generated from project.yml by XcodeGen, linking the
# vendored lfwdesignsystem Swift Package at the repo root.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ios-tests-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  unit-tests:
    name: Swift unit tests
    runs-on: macos-14
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for testing
        run: |
          set -euo pipefail
          xcodebuild build-for-testing \
            -scheme WordOfTheDay \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            EXCLUDED_ARCHS=x86_64 \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS="DEBUG CI"

      - name: Run unit tests
        run: |
          set -euo pipefail
          DEST='platform=iOS Simulator,name=iPhone 15'
          if ! xcrun simctl list devices available | grep -q "iPhone 15 ("; then
            UDID=$(xcrun simctl list devices available --json \
              | python3 -c "import json,sys; r=json.load(sys.stdin)['devices']; ids=[d['udid'] for ds in r.values() for d in ds if d['name'].startswith('iPhone')]; print(ids[0] if ids else '')")
            if [ -z "$UDID" ]; then
              echo "::error::No iPhone simulator available on this runner"
              xcrun simctl list devices available
              exit 1
            fi
            DEST="id=$UDID"
          fi
          xcodebuild test-without-building \
            -scheme WordOfTheDay \
            -destination "$DEST" \
            CODE_SIGNING_ALLOWED=NO
