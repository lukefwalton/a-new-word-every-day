name: iOS Tests

# Builds the app + widget extension and runs the Swift unit suite on a macOS
# runner. The Xcode project is generated from project.yml by XcodeGen, linking the
# vendored lfwdesignsystem Swift Package at the repo root.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ios-tests-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  unit-tests:
    name: Swift unit tests
    runs-on: macos-14
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      # Fonts must be fetched BEFORE `xcodegen generate`: the Resources group is
      # an enumerated group (not a folder reference), so XcodeGen only bundles the
      # font files that exist on disk at generation time. The .ttf files are
      # gitignored (fetched, not committed), so generating first would leave them
      # out of the app/widget bundles and break DesignSystemBridgeTests.
      - name: Fetch bundled OFL variable fonts
        run: bash scripts/fetch_fonts.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for testing
        run: |
          set -euo pipefail
          xcodebuild build-for-testing \
            -scheme WordOfTheDay \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            EXCLUDED_ARCHS=x86_64 \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS="DEBUG CI"

      - name: Run unit tests
        run: |
          set -euo pipefail
          DEST=$(python3 <<'PY'
          import json, subprocess
          out = subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "-j"], text=True)
          iphones = [d for ds in json.loads(out)["devices"].values() for d in ds
                     if d.get("isAvailable") and d["name"].startswith("iPhone")]
          if not iphones:
              raise SystemExit("No iPhone simulator available on this runner")
          for preferred in ("iPhone 15", "iPhone 16", "iPhone 17"):
              for d in iphones:
                  if d["name"] == preferred:
                      print(f"platform=iOS Simulator,id={d['udid']}")
                      raise SystemExit
          print(f"platform=iOS Simulator,id={iphones[0]['udid']}")
          PY
          )
          # Retry flaky tests (e.g. the simulator's intermittent "Failed to
          # terminate" on app relaunch) instead of failing the whole run. A
          # genuinely broken test still fails after all iterations.
          xcodebuild test-without-building \
            -scheme WordOfTheDay \
            -destination "$DEST" \
            -retry-tests-on-failure \
            -test-iterations 3 \
            CODE_SIGNING_ALLOWED=NO
