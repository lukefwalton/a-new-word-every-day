name: iOS Tests

# Builds the app + widget extension and runs the Swift unit suite on a macOS
# runner. The Xcode project is generated from project.yml by XcodeGen, linking the
# vendored lfwdesignsystem Swift Package at the repo root.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ios-tests-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  unit-tests:
    name: Swift unit tests
    # macos-15 ships Xcode 16 (Swift 6 build tools). Required because the swift-fsrs
    # v5.0.0 package manifest declares swift-tools-version 6.0, which Xcode 15.x (the
    # macos-14 default) refuses to resolve. The app itself still builds in Swift 5
    # language mode for iOS 17 — only the toolchain that reads the manifest moves.
    runs-on: macos-15
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for testing
        run: |
          set -euo pipefail
          xcodebuild build-for-testing \
            -scheme WordOfTheDay \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            EXCLUDED_ARCHS=x86_64 \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS="DEBUG CI"

      - name: Run unit tests
        run: |
          set -euo pipefail
          DEST=$(python3 <<'PY'
          import json, subprocess
          out = subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "-j"], text=True)
          iphones = [d for ds in json.loads(out)["devices"].values() for d in ds
                     if d.get("isAvailable") and d["name"].startswith("iPhone")]
          if not iphones:
              raise SystemExit("No iPhone simulator available on this runner")
          for preferred in ("iPhone 15", "iPhone 16", "iPhone 17"):
              for d in iphones:
                  if d["name"] == preferred:
                      print(f"platform=iOS Simulator,id={d['udid']}")
                      raise SystemExit
          print(f"platform=iOS Simulator,id={iphones[0]['udid']}")
          PY
          )
          xcodebuild test-without-building \
            -scheme WordOfTheDay \
            -destination "$DEST" \
            CODE_SIGNING_ALLOWED=NO
