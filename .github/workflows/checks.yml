name: Checks

# Config guardrails that don't need Xcode. Validates that the App Group
# identifier in project.yml matches the constant in Shared/AppGroup.swift, so the
# app and the widget can never drift onto two different on-device stores, and that
# the bundled corpus is well-formed. Companion to ios-tests.yml.
#
# Note: words.json is built offline by scripts/build_modern_corpus.py, which
# needs wordfreq + NLTK corpora (large downloads) — too heavy to regenerate in
# CI. So instead of a regenerate-and-diff check we validate the shipped file's
# structure directly (the same invariants WordOfTheDayTests/CorpusTests asserts).

on:
  pull_request:
  push:
    branches: [main]

jobs:
  config-guardrails:
    name: Config guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: App Group identifier sync (project.yml ↔ Swift)
        run: bash scripts/check_appgroup_sync.sh
      - name: Corpus is well-formed (words.json)
        run: |
          python3 - <<'PY'
          import json, sys
          words = json.load(open("WordOfTheDay/Resources/words.json"))
          errors = []
          if not isinstance(words, list) or not words:
              sys.exit("::error::words.json must be a non-empty JSON array")
          ids = [w["id"] for w in words]
          if len(set(ids)) != len(ids):
              errors.append("duplicate ids")
          if not all(isinstance(i, int) and i > 0 for i in ids):
              errors.append("ids must be positive integers")
          valid_pos = {"n", "v", "adj", "adv"}
          names = set()
          for w in words:
              tag = f"id={w.get('id')}"
              if not str(w.get("word", "")).strip(): errors.append(f"{tag}: blank word")
              if not str(w.get("definition", "")).strip(): errors.append(f"{tag}: blank definition")
              if not str(w.get("example", "")).strip(): errors.append(f"{tag}: blank example")
              if w.get("pos") not in valid_pos: errors.append(f"{tag}: bad pos {w.get('pos')!r}")
              if w.get("band") not in (1, 2, 3, 4, 5): errors.append(f"{tag}: band out of range")
              names.add(w.get("word"))
          if len(names) != len(words):
              errors.append("duplicate headwords")
          from collections import Counter
          band_counts = Counter(w["band"] for w in words)
          if set(band_counts) != {1, 2, 3, 4, 5}:
              errors.append("every difficulty band (1..5) must be represented")
          elif len(set(band_counts.values())) != 1:
              errors.append(f"bands must be equal-sized; got {dict(sorted(band_counts.items()))}")
          if errors:
              sys.exit("::error::words.json invalid:\n" + "\n".join(errors[:50]))
          print(f"words.json OK — {len(words)} entries, bands 1..5 present")
          PY
      - name: Sense regressions (golden senses for ambiguous words)
        run: |
          python3 - <<'PY'
          import json, sys
          golden = json.load(open("scripts/sense_golden.json"))
          by_word = {w["word"]: w for w in json.load(open("WordOfTheDay/Resources/words.json"))}
          # Words whose WordNet sense was hand-corrected (e.g. hacker -> the
          # programmer, not the bad golfer). If regeneration drifts back to the
          # wrong sense, fail here. Update sense_golden.json deliberately when a
          # definition is intentionally changed.
          errors = []
          for word, want in golden.items():
              got = by_word.get(word)
              if not got:
                  errors.append(f"{word}: missing from corpus")
              elif got["pos"] != want["pos"] or got["definition"] != want["definition"]:
                  errors.append(f"{word}: sense drifted\n    want: {want['pos']} | {want['definition']}\n    got:  {got['pos']} | {got['definition']}")
          if errors:
              sys.exit("::error::sense regression:\n" + "\n".join(errors))
          print(f"sense golden OK — {len(golden)} ambiguous words pinned")
          PY
