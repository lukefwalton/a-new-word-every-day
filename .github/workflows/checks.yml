name: Checks

# Config guardrails that don't need Xcode. Validates that the App Group
# identifier in project.yml matches the constant in Shared/AppGroup.swift, so the
# app and the widget can never drift onto two different on-device stores, and that
# the bundled corpus is well-formed. Companion to ios-tests.yml.
#
# words.json is assembled by scripts/build_corpus.py from the hand-authored,
# CC0 scripts/corpus_source.json — no external data, no heavy deps — so CI both
# validates structure and confirms the file is up to date with its source.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  config-guardrails:
    name: Config guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Vendored design system integrity (accidental-drift guard)
        run: bash scripts/check_designsystem_sync.sh
      - name: App Group identifier sync (project.yml ↔ Swift)
        run: bash scripts/check_appgroup_sync.sh
      - name: Bundled typeface list sync (Swift ↔ plists ↔ fetch script)
        run: bash scripts/check_fonts_sync.sh
      - name: Corpus regenerates deterministically
        run: |
          python3 scripts/build_corpus.py
          git diff --exit-code WordOfTheDay/Resources/words.json \
            || (echo "::error::words.json is out of date — run scripts/build_corpus.py and commit." && exit 1)
      - name: Corpus is well-formed (words.json)
        run: |
          python3 - <<'PY'
          import json, sys
          words = json.load(open("WordOfTheDay/Resources/words.json"))
          errors = []
          if not isinstance(words, list) or len(words) < 1000:
              sys.exit(f"::error::words.json looks too small ({len(words) if isinstance(words, list) else 'n/a'}) — expected the full ~1000+ corpus; accidental content drop?")
          ids = [w["id"] for w in words]
          if not all(isinstance(i, int) and i > 0 for i in ids):
              errors.append("ids must be positive integers")
          if len(set(ids)) != len(ids):
              errors.append("duplicate ids")
          valid_pos = {"n", "v", "adj", "adv"}
          names = set()
          for w in words:
              tag = f"id={w.get('id')}"
              if not str(w.get("word", "")).strip(): errors.append(f"{tag}: blank word")
              if not str(w.get("definition", "")).strip(): errors.append(f"{tag}: blank definition")
              if w.get("pos") not in valid_pos: errors.append(f"{tag}: bad pos {w.get('pos')!r}")
              if w.get("band") not in (1, 2, 3, 4, 5): errors.append(f"{tag}: band out of range")
              names.add(w.get("word"))
          if len(names) != len(words):
              errors.append("duplicate headwords")
          if {w["band"] for w in words} != {1, 2, 3, 4, 5}:
              errors.append("every difficulty band (1..5) must be represented")
          if errors:
              sys.exit("::error::words.json invalid:\n" + "\n".join(errors[:50]))
          print(f"words.json OK — {len(words)} entries, bands 1..5 present")
          PY
